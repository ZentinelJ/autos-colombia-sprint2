<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autos Colombia - Login</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/icons8-coches-68.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/icons8-coches-68.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/icons8-coches-68.png">
    <link rel="icon" type="image/x-icon" href="favicon_io/icons8-coches-68.png">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <div class="col-left"></div>
        <div class="col-right">
            <div class="login-box">
                <h1>LOGIN</h1>
                <input type="text" id="usuario" placeholder="USUARIO">
                <input type="password" id="password" placeholder="CONTRASEÑA">
                <button onclick="login()">ENTRAR</button>
                <div id="error-msg">Usuario o contraseña incorrectos.</div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
